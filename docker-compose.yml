version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nakasero_db
    restart: always
    environment:
      POSTGRES_DB: nakasero_booking
      POSTGRES_USER: nakasero_user
      POSTGRES_PASSWORD: nakasero_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: nakasero_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nakasero_booking
      DB_USER: nakasero_user
      DB_PASS: nakasero_pass
      JWT_SECRET: nakasero_jwt_s3cur3_k3y_2026!@#$%
      PORT: 5000
      NODE_ENV: development
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: nakasero_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata: